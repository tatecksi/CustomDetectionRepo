name: Deploy Content to adminsoc [a327023f-36f8-4b78-919b-2641770c08fb]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-a327023f-36f8-4b78-919b-2641770c08fb.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-a327023f-36f8-4b78-919b-2641770c08fb.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'admin'
      workspaceName: 'adminsoc'
      workspaceId: '4b0f6f0e-1010-4aa5-838b-3c0b18702683'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'CustomDetection'
      branch: 'main'
      sourceControlId: 'a327023f-36f8-4b78-919b-2641770c08fb'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a327023f36f84b78919b2641770c08fb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a327023f36f84b78919b2641770c08fb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a327023f36f84b78919b2641770c08fb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a327023f36f84b78919b2641770c08fb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a327023f36f84b78919b2641770c08fb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a327023f36f84b78919b2641770c08fb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_a327023f36f84b78919b2641770c08fb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_a327023f36f84b78919b2641770c08fb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_a327023f36f84b78919b2641770c08fb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-a327023f-36f8-4b78-919b-2641770c08fb.ps1